name: Python Dependency Security Audit

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/security-python.yml"
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/security-python.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.1"
          python-version: "3.11"

      - name: Check if lockfile is up to date
        run: uv lock --check

      - name: Install the project
        run: uv sync --all-extras

      # pygments CVE-2026-4539: pas de wheel >2.19.2 sur PyPI ; retirer --ignore-vuln après correctif upstream.
      - name: Run pip-audit
        run: uv run --with pip-audit pip-audit --desc --format markdown --output pip-audit-report.md --ignore-vuln CVE-2026-4539

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.md
