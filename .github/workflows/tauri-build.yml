name: Tauri Desktop Build

on:
  push:
    branches: [main]
    paths:
      - "whisperx-studio/**"
      - ".github/workflows/tauri-build.yml"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            artifact-name: LingWhistX-macOS-arm64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            artifact-name: LingWhistX-macOS-x64
          - platform: windows-latest
            args: ""
            artifact-name: LingWhistX-Windows-x64
          - platform: ubuntu-22.04
            args: ""
            artifact-name: LingWhistX-Linux-x64

    runs-on: ${{ matrix.platform }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: whisperx-studio/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.args, 'x86_64-apple-darwin') && 'x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: whisperx-studio/src-tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node dependencies
        working-directory: whisperx-studio
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: whisperx-studio
          tauriScript: npm run tauri
          args: ${{ matrix.args }}

      - name: Upload dev artifacts
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            whisperx-studio/src-tauri/target/**/release/bundle/dmg/*.dmg
            whisperx-studio/src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            whisperx-studio/src-tauri/target/**/release/bundle/deb/*.deb
            whisperx-studio/src-tauri/target/**/release/bundle/appimage/*.AppImage
            whisperx-studio/src-tauri/target/**/release/bundle/msi/*.msi
            whisperx-studio/src-tauri/target/**/release/bundle/nsis/*.exe
          retention-days: 30
          if-no-files-found: warn

      - name: Attach release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            whisperx-studio/src-tauri/target/**/release/bundle/dmg/*.dmg
            whisperx-studio/src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            whisperx-studio/src-tauri/target/**/release/bundle/deb/*.deb
            whisperx-studio/src-tauri/target/**/release/bundle/appimage/*.AppImage
            whisperx-studio/src-tauri/target/**/release/bundle/msi/*.msi
            whisperx-studio/src-tauri/target/**/release/bundle/nsis/*.exe
