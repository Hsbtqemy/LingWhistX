name: WhisperX Studio CI

on:
  push:
    branches: [main]
    paths:
      - "whisperx-studio/**"
      - "whisperx/**"
      - ".github/workflows/studio-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "whisperx-studio/**"
      - "whisperx/**"
      - ".github/workflows/studio-ci.yml"
  workflow_dispatch:

jobs:
  build-and-check:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: whisperx-studio/package-lock.json

      - name: Install Linux dependencies for Tauri
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node dependencies
        working-directory: whisperx-studio
        run: npm ci

      - name: Prettier (check)
        working-directory: whisperx-studio
        run: npm run format:check

      - name: Python syntax (Studio worker)
        run: python -m py_compile whisperx-studio/python/worker.py

      - name: Build frontend
        working-directory: whisperx-studio
        run: npm run build

      - name: ESLint
        working-directory: whisperx-studio
        run: npm run lint

      - name: Vitest
        working-directory: whisperx-studio
        run: npm run test

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cargo check (Tauri backend)
        run: cargo check --manifest-path whisperx-studio/src-tauri/Cargo.toml

      - name: Cargo fmt --check (Tauri backend)
        run: cargo fmt --manifest-path whisperx-studio/src-tauri/Cargo.toml --check

      - name: Cargo clippy (Tauri backend)
        run: cargo clippy --manifest-path whisperx-studio/src-tauri/Cargo.toml -- -D warnings

      - name: Cargo test (Tauri backend)
        run: cargo test --manifest-path whisperx-studio/src-tauri/Cargo.toml
