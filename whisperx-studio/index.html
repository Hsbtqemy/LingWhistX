<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#f8fafb"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#0f1419"
    />
    <title>LingWhistX Studio</title>
    <!--
      Thème avant premier paint : aligné sur LX_THEME_STORAGE_KEY / readStoredThemePreference
      dans src/theme/applyStoredTheme.ts (évite un flash clair↔sombre si préférence explicite).
    -->
    <script>
      (function () {
        try {
          var k = "lx-theme";
          var v = localStorage.getItem(k);
          if (v == null || String(v).trim() === "") {
            document.documentElement.setAttribute("data-lx-theme", "system");
            return;
          }
          v = String(v).trim().toLowerCase();
          if (v === "system") {
            document.documentElement.setAttribute("data-lx-theme", "system");
          } else if (v === "dark" || v === "light") {
            document.documentElement.setAttribute("data-lx-theme", v);
          } else {
            document.documentElement.setAttribute("data-lx-theme", "system");
          }
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
